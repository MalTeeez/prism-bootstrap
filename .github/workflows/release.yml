name: Release

on:
  push:
    tags:
      - "*"

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: prism-bootstrap

jobs:
  build:
    permissions:
      contents: write
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            linker: gcc-aarch64-linux-gnu
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross linker
        if: matrix.linker != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.linker }}
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage binary (unix)
        if: runner.os != 'Windows'
        run: |
          asset="${BINARY_NAME}-${{ github.ref_name }}-${{ matrix.target }}"
          cp "target/${{ matrix.target }}/release/${BINARY_NAME}" "$asset"
          echo "ASSET=$asset" >> "$GITHUB_ENV"

      - name: Stage binary (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          asset="${BINARY_NAME}-${{ github.ref_name }}-${{ matrix.target }}.exe"
          cp "target/${{ matrix.target }}/release/${BINARY_NAME}.exe" "$asset"
          echo "ASSET=$asset" >> "$GITHUB_ENV"

      - name: Upload binary to release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: ${{ env.ASSET }}
